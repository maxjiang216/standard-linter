# Runs the shared Code Standards checks on this repository (self-test).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards:
    uses: ./.github/workflows/standards.yml
    with:
      python: false
      cpp: false
      rust: false
      javascript: false
      go: false
      bash: true
