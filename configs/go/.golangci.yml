# golangci-lint v2 (requires explicit version: "2" for golangci-lint 2.x).
# Skips node_modules/ (e.g. npm packages that ship Go) and vendor/.
version: "2"

run:
  tests: true
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - gosec
    - cyclop
    - funlen
    - gocognit
    - dupl
    - godot
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
    cyclop:
      max-complexity: 10
    gocognit:
      min-complexity: 25
    funlen:
      lines: 80
      statements: 50
    dupl:
      threshold: 100
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: context-as-argument
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - gosec
        path: _test\.go$
    paths:
      - node_modules
      - vendor
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - node_modules
      - vendor
      - third_party$
      - builtin$
      - examples$
